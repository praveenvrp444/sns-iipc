// ─── Map Functions ──────────────────────────────────────────────────────────

function mapCollegesData(rows) {
  return rows.slice(1)
    .filter(row => row && row.length > 0 && (row[0] || '').trim() !== '')
    .map(row => ({
      id: (row[0] || '').trim(),
      name: (row[1] || '').trim() || '',
      short: (row[2] || '').trim() || (row[1] || '').trim() || 'N/A',
      code: (row[3] || '').trim() || '',
      accr: (row[4] || '').trim() || '',
      email: (row[5] || '').trim() || '',
      phone: (row[6] || '').trim() || '',
      poc: (row[7] || '').trim() || '',
      color: (row[8] || '').trim() || '#888888'
    }))
    .filter(c => c.id !== '');
}

function mapTrainingData(rows) {
  // Expects columns: key, title, partner, description, modules (comma-separated)
  const result = {};
  rows.slice(1).forEach(row => {
    if (!row || row.length === 0) return;
    const key = (row[0] || '').trim();
    if (key === '') return;
    result[key] = {
      t: (row[1] || '').trim() || '',
      p: (row[2] || '').trim() || '',
      d: (row[3] || '').trim() || '',
      m: (row[4] || '').trim()
           ? row[4].split(',').map(s => s.trim()).filter(s => s !== '')
           : []
    };
  });
  return result;
}

function mapDeptsData(rows) {
  // Expects columns: college_id, department_name (one row per department)
  // Groups by college_id into arrays, e.g. { snsct: ["All","CSE","IT",...], snsce: [...] }
  const result = {};
  rows.slice(1).forEach(row => {
    if (!row || row.length === 0) return;
    const collegeId = (row[0] || '').trim();
    const deptName = (row[1] || '').trim();
    if (collegeId === '' || deptName === '') return;
    if (!result[collegeId]) {
      result[collegeId] = [];
    }
    if (!result[collegeId].includes(deptName)) {
      result[collegeId].push(deptName);
    }
  });
  return result;
}

function mapYearsData(rows) {
  // Expects column: academic_year (one row per year, e.g. "2024-25")
  return rows.slice(1)
    .map(row => (row && row[0] ? (row[0] || '').trim() : ''))
    .filter(y => y !== '');
}

function mapYSData(rows) {
  // Expects columns: college_id, year, highest, avg, median, placed, eligible, recruiters, offers
  // Groups by college_id then by year, e.g.
  // { snsct: { "2024-25": { h, a, m, p, e, r, o }, ... }, snsce: { ... } }
  const result = {};
  rows.slice(1).forEach(row => {
    if (!row || row.length === 0) return;
    const collegeId = (row[0] || '').trim();
    const year = (row[1] || '').trim();
    if (collegeId === '' || year === '') return;
    if (!result[collegeId]) {
      result[collegeId] = {};
    }
    result[collegeId][year] = {
      h: (row[2] || '').trim() || '-',
      a: (row[3] || '').trim() || '-',
      m: (row[4] || '').trim() || '-',
      p: parseInt(row[5], 10) || 0,
      e: parseInt(row[6], 10) || 0,
      r: parseInt(row[7], 10) || 0,
      o: parseInt(row[8], 10) || 0
    };
  });
  return result;
}

function mapCatsData(rows) {
  // Expects column: category_name (one row per category)
  return rows.slice(1)
    .map(row => (row && row[0] ? (row[0] || '').trim() : ''))
    .filter(c => c !== '');
}

function mapCVData(rows) {
  // Expects columns: company, academic_year, date, package, roles, category, college, status, placed, dept
  return rows.slice(1)
    .filter(row => row && row.length > 0 && (row[0] || '').trim() !== '')
    .map(row => ({
      co: (row[0] || '').trim(),
      ay: (row[1] || '').trim(),
      dt: (row[2] || '').trim(),
      pk: (row[3] || '').trim(),
      ro: (row[4] || '').trim(),
      cat: (row[5] || '').trim(),
      cl: (row[6] || '').trim(),
      st: (row[7] || '').trim(),
      sp: row[8] ? parseInt(row[8], 10) || null : null,
      dept: (row[9] || '').trim()
    }));
}

function mapUpcomingData(rows) {
  // Expects columns: company, date, package, roles, eligibility, college
  return rows.slice(1)
    .filter(row => row && row.length > 0 && (row[0] || '').trim() !== '')
    .map(row => ({
      co: (row[0] || '').trim(),
      dt: (row[1] || '').trim(),
      pk: (row[2] || '').trim(),
      ro: (row[3] || '').trim(),
      el: (row[4] || '').trim(),
      cl: (row[5] || '').trim()
    }));
}

function mapCertsData(rows) {
  // Expects columns: type (it/core), name, count, color
  // Groups by type, e.g. { it: [{n,c,cl},...], core: [{n,c,cl},...] }
  const result = {};
  rows.slice(1).forEach(row => {
    if (!row || row.length === 0) return;
    const name = (row[0] || '').trim();
    const type = (row[1] || '').trim().toLowerCase();
    if (type === '' || name === '') return;
    if (!result[type]) result[type] = [];
    result[type].push({
      n: name,
      c: parseInt(row[2], 10) || 0,
      cl: (row[3] || '').trim() || '#888888'
    });
  });
  return result;
}

function mapPLData(rows) {
  // Expects columns: name, usage/description
  return rows.slice(1)
    .filter(row => row && row.length > 0 && (row[0] || '').trim() !== '')
    .map(row => ({
      n: (row[0] || '').trim(),
      u: (row[1] || '').trim()
    }));
}

function mapFACData(rows) {
  // Expects columns: icon, title, description
  return rows.slice(1)
    .filter(row => row && row.length > 0 && (row[0] || '').trim() !== '')
    .map(row => ({
      i: (row[0] || '').trim(),
      t: (row[1] || '').trim(),
      d: (row[2] || '').trim()
    }));
}

function mapPlacedData(rows) {
  // Expects columns: student_id, name, photo_url, dept, college, company, ctc, role
  return rows.slice(1)
    .filter(row => row && row.length > 0 && (row[0] || '').trim() !== '')
    .map(row => ({
      id: (row[0] || '').trim(),
      n: (row[1] || '').trim(),
      img: (row[2] || '').trim(),
      dept: (row[3] || '').trim(),
      c: (row[4] || '').trim(),
      co: (row[5] || '').trim(),
      r: (row[6] || '').trim(),
      role: (row[7] || '').trim()
    }));
}

// Color mapping based on range (from original hardcoded values)
const SB_RANGE_COLORS = {
  '₹20L+': '#C41230',
  '₹15-20L': '#E63946',
  '₹10-15L': '#F4845F',
  '₹7-10L': '#F7B267',
  '₹5-7L': '#7FB069',
  '₹3-5L': '#4ECDC4',
  '₹2-3L': '#45B7D1',
};

function mapSBData(rows) {
  // Sheet columns: Salary Band, Academic Year, SNSCT Count, SNSCE Count, Dr. SNSRCASE Count
  // Uses header-based detection to handle any gap columns from Sheets Table view
  if (!rows || rows.length < 2) return [];
  const header = rows[0].map(h => (h || '').trim().toLowerCase());
  const iRange = header.findIndex(h => h.includes('salary') || h.includes('band'));
  const iYear = header.findIndex(h => h.includes('academic') || h.includes('year'));
  const iSnsct = header.findIndex(h => h.includes('snsct'));
  const iSnsce = header.findIndex(h => h.includes('snsce'));
  const iDrsns = header.findIndex(h => h.includes('snsrcase') || h.includes('drsns'));
  return rows.slice(1)
    .filter(row => row && row.length > 0 && (row[iRange >= 0 ? iRange : 0] || '').trim() !== '')
    .map(row => {
      const range = (row[iRange >= 0 ? iRange : 0] || '').trim();
      return {
        range: range,
        ay: (row[iYear >= 0 ? iYear : 1] || '').trim(),
        snsct: parseInt(row[iSnsct >= 0 ? iSnsct : 2], 10) || 0,
        snsce: parseInt(row[iSnsce >= 0 ? iSnsce : 3], 10) || 0,
        drsnsrcas: parseInt(row[iDrsns >= 0 ? iDrsns : 4], 10) || 0,
        c: SB_RANGE_COLORS[range] || '#888888'
      };
    });
}

// ─── Sheet Config & Batch Fetch (single API call for all 13 sheets) ─────────
const SHEETS = [
  { sheet: colleges_sheet,          key: 'colleges', mapFn: mapCollegesData, assign: d => COLLEGES = d },
  { sheet: trainingModules_sheet,   key: 'training', mapFn: mapTrainingData, assign: d => TR = d },
  { sheet: departmentMapping_sheet, key: 'depts',    mapFn: mapDeptsData,    assign: d => DEPTS = d },
  { sheet: academicYears_sheet,     key: 'years',    mapFn: mapYearsData,    assign: d => YEARS = d },
  { sheet: placementstats_sheet,    key: 'ys',       mapFn: mapYSData,       assign: d => YS = d },
  { sheet: categories_sheet,        key: 'cats',     mapFn: mapCatsData,     assign: d => CATS = d },
  { sheet: companyVisits_sheet,     key: 'cv',       mapFn: mapCVData,       assign: d => CV = d },
  { sheet: upcomingDrives_sheet,    key: 'upcoming', mapFn: mapUpcomingData, assign: d => UPCOMING = d },
  { sheet: certifications_sheet,    key: 'certs',    mapFn: mapCertsData,    assign: d => CERTS = d },
  { sheet: trainingPlatforms_sheet, key: 'pl',       mapFn: mapPLData,       assign: d => PL = d },
  { sheet: facilities_sheet,        key: 'fac',      mapFn: mapFACData,      assign: d => FAC = d },
  { sheet: placedStudents_sheet,    key: 'placed',   mapFn: mapPlacedData,   assign: d => PLACED = d },
  { sheet: salaryDistribution_sheet,key: 'sb',       mapFn: mapSBData,       assign: d => SB = d },
];

const CACHE_KEY_ALL = 'sns_portal_data';
const CACHE_KEY_ALL_TIME = 'sns_portal_data_time';

async function fetchAllSheets(force = false) {
  const now = Date.now();
  if (!force) {
    const cached = localStorage.getItem(CACHE_KEY_ALL);
    const cachedTime = localStorage.getItem(CACHE_KEY_ALL_TIME);
    if (cached && cachedTime && (now - parseInt(cachedTime, 10) < CACHE_DURATION_MS)) {
      try {
        const allData = JSON.parse(cached);
        SHEETS.forEach(s => { if (allData[s.key]) s.assign(allData[s.key]); });
        return;
      } catch (e) { /* corrupted cache, re-fetch */ }
    }
  }
  const ranges = SHEETS.map(s => encodeURIComponent(s.sheet)).join('&ranges=');
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values:batchGet?ranges=${ranges}&key=${SHEET_API_KEY}`;
  try {
    const res = await fetch(url);
    if (!res.ok) { console.error(`batchGet failed: HTTP ${res.status}`); return; }
    const data = await res.json();
    if (!data.valueRanges) { console.error('batchGet: no valueRanges', data); return; }
    const allData = {};
    data.valueRanges.forEach((vr, i) => {
      const cfg = SHEETS[i];
      if (!vr.values || vr.values.length < 2) return;
      const parsed = cfg.mapFn(vr.values);
      if (parsed != null) { cfg.assign(parsed); allData[cfg.key] = parsed; }
    });
    localStorage.setItem(CACHE_KEY_ALL, JSON.stringify(allData));
    localStorage.setItem(CACHE_KEY_ALL_TIME, now.toString());
  } catch (err) {
    console.error('Failed to fetch sheets:', err);
  }
}

fetchAllSheets();
setInterval(() => fetchAllSheets(true), CACHE_DURATION_MS);
