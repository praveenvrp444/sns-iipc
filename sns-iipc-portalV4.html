// ─── Generic fetchDataFromSheet Function ────────────────────────────────────
// Fetches data from any Google Sheet tab, with localStorage caching.
// @param {string} sheetName      - The sheet/tab name to fetch
// @param {string} cacheKey       - localStorage key for cached data
// @param {string} cacheTimeKey   - localStorage key for cache timestamp
// @param {function} mapFn        - Function to transform raw rows into desired structure
// @param {function} assignFn     - Function to assign parsed data to the target variable
// @param {boolean} force         - If true, skip cache and fetch from API
async function fetchDataFromSheet(sheetName, cacheKey, cacheTimeKey, mapFn, assignFn, force = false) {
  const now = Date.now();
  // Check cache first
  const cached = localStorage.getItem(cacheKey);
  const cachedTime = localStorage.getItem(cacheTimeKey);
  if (!force && cached && cachedTime && (now - parseInt(cachedTime, 10) < CACHE_DURATION_MS)) {
    try {
      assignFn(JSON.parse(cached));
      return;
    } catch (e) {
      // If cache is corrupted, ignore and fetch from API
    }
  }
  // Build the API URL from config variables
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheetName}?key=${SHEET_API_KEY}`;
  try {
    const response = await fetch(url);
    if (!response.ok) {
      console.error(`HTTP ${response.status} fetching sheet "${sheetName}"`);
      return;
    }
    const data = await response.json();
    if (!data || !Array.isArray(data.values) || data.values.length < 2) {
      console.error(`No data found in sheet "${sheetName}":`, data);
      return;
    }
    const parsed = mapFn(data.values);
    if (parsed == null) {
      console.error(`mapFn returned null/undefined for sheet "${sheetName}"`);
      return;
    }
    assignFn(parsed);
    localStorage.setItem(cacheKey, JSON.stringify(parsed));
    localStorage.setItem(cacheTimeKey, now.toString());
  } catch (error) {
    console.error(`Failed to fetch from sheet "${sheetName}":`, error);
  }
}

// ─── College_Master: map & assign ───────────────────────────────────────────
const CACHE_KEY_COLLEGES = 'sns_colleges_cache';
const CACHE_KEY_COLLEGES_TIME = 'sns_colleges_cache_time';

function mapCollegesData(rows) {
  return rows.slice(1)
    .filter(row => row && row.length > 0 && (row[0] || '').trim() !== '')
    .map(row => ({
      id: (row[0] || '').trim(),
      name: (row[1] || '').trim() || '',
      short: (row[2] || '').trim() || (row[1] || '').trim() || 'N/A',
      code: (row[3] || '').trim() || '',
      accr: (row[4] || '').trim() || '',
      email: (row[5] || '').trim() || '',
      phone: (row[6] || '').trim() || '',
      poc: (row[7] || '').trim() || '',
      color: (row[8] || '').trim() || '#888888'
    }))
    .filter(c => c.id !== '');
}

function assignCollegesData(data) {
  COLLEGES = data;
}

// ─── Training_Modules: map & assign ─────────────────────────────────────────
const CACHE_KEY_TR = 'sns_training_cache';
const CACHE_KEY_TR_TIME = 'sns_training_cache_time';

function mapTrainingData(rows) {
  // Expects columns: key, title, partner, description, modules (comma-separated)
  const result = {};
  rows.slice(1).forEach(row => {
    if (!row || row.length === 0) return;
    const key = (row[0] || '').trim();
    if (key === '') return;
    result[key] = {
      t: (row[1] || '').trim() || '',
      p: (row[2] || '').trim() || '',
      d: (row[3] || '').trim() || '',
      m: (row[4] || '').trim()
           ? row[4].split(',').map(s => s.trim()).filter(s => s !== '')
           : []
    };
  });
  return result;
}

function assignTrainingData(data) {
  TR = data;
}

// ─── Department_Mapping: map & assign ────────────────────────────────────────
const CACHE_KEY_DEPTS = 'sns_depts_cache';
const CACHE_KEY_DEPTS_TIME = 'sns_depts_cache_time';

function mapDeptsData(rows) {
  // Expects columns: college_id, department_name (one row per department)
  // Groups by college_id into arrays, e.g. { snsct: ["All","CSE","IT",...], snsce: [...] }
  const result = {};
  rows.slice(1).forEach(row => {
    if (!row || row.length === 0) return;
    const collegeId = (row[0] || '').trim();
    const deptName = (row[1] || '').trim();
    if (collegeId === '' || deptName === '') return;
    if (!result[collegeId]) {
      result[collegeId] = [];
    }
    if (!result[collegeId].includes(deptName)) {
      result[collegeId].push(deptName);
    }
  });
  return result;
}

function assignDeptsData(data) {
  DEPTS = data;
}

// ─── Academic_Years: map & assign ────────────────────────────────────────────
const CACHE_KEY_YEARS = 'sns_years_cache';
const CACHE_KEY_YEARS_TIME = 'sns_years_cache_time';

function mapYearsData(rows) {
  // Expects column: academic_year (one row per year, e.g. "2024-25")
  return rows.slice(1)
    .map(row => (row && row[0] ? (row[0] || '').trim() : ''))
    .filter(y => y !== '');
}

function assignYearsData(data) {
  YEARS = data;
}
